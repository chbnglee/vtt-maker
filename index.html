<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VTT Maker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --surface:  #f8f9fb;
      --border:   #e2e5ec;
      --accent:   #6c63ff;
      --accent-h: #5750d9;
      --text:     #1a1d2e;
      --muted:    #8b90a7;
      --success:  #16a34a;
      --radius:   10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
    }

    .phase { display: none; }
    .phase.active { display: block; }

    /* ── 버튼 공통 ──────────────────────────────────────── */
    .btn {
      display: inline-block; padding: 0.75rem 1.5rem;
      background: var(--accent); color: #fff;
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-h); }
    .btn-ghost {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
    .btn-block { display: block; width: 100%; text-align: center; }

    /* ════════════════════════════════════════════════════
       PHASE 1 — 설정
    ════════════════════════════════════════════════════ */
    #phase-setup { padding: 2.5rem 1rem 4rem; }
    .setup-wrap  { max-width: 660px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { font-size: 0.9rem; color: var(--muted); margin-top: 0.3rem; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    }
    .card-label {
      font-size: 0.75rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; display: block;
    }
    .file-drop {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 1.75rem; text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; position: relative; background: #fff;
    }
    .file-drop:hover, .file-drop.drag { border-color: var(--accent); background: rgba(108,99,255,0.03); }
    .file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 2rem; }
    .drop-text { font-size: 0.88rem; color: var(--muted); margin-top: 0.35rem; }
    .drop-name  { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-top: 0.4rem; word-break: break-all; }

    textarea {
      width: 100%; background: #fff; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.93rem;
      padding: 0.65rem 0.9rem; outline: none;
      transition: border-color 0.15s; resize: vertical; min-height: 160px;
      font-family: inherit; line-height: 1.6;
    }
    textarea:focus { border-color: var(--accent); }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; }
    #setup-error { font-size: 0.83rem; color: #dc2626; margin-bottom: 0.75rem; min-height: 1.2em; }

    /* ════════════════════════════════════════════════════
       PHASE 2 — 타이밍 작업
    ════════════════════════════════════════════════════ */
    #phase-tap { height: 100vh; display: none; flex-direction: column; }
    #phase-tap.active { display: flex; }

    .tap-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .tap-top h2 { font-size: 0.95rem; font-weight: 700; }
    .tap-top .tap-meta { font-size: 0.82rem; color: var(--muted); }

    .tap-body { display: flex; flex: 1; overflow: hidden; }

    /* 비디오 */
    .tap-video-wrap { flex: 1; background: #000; position: relative; display: flex; align-items: center; }
    .tap-video-wrap video { width: 100%; max-height: 100%; display: block; outline: none; }

    /* 자막 미리보기 (탭 중) */
    .tap-sub-preview {
      position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); color: #fff; padding: 0.4rem 1rem;
      border-radius: 6px; font-size: 1rem; font-weight: 500;
      max-width: 80%; text-align: center; pointer-events: none;
      display: none;
    }

    /* 줄 목록 패널 */
    .tap-panel {
      width: 340px; flex-shrink: 0; border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .tap-panel-head {
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      font-size: 0.78rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
    }
    .lines-list { flex: 1; overflow-y: auto; padding: 0.5rem; }

    .line-item {
      padding: 0.55rem 0.75rem; border-radius: 7px; margin-bottom: 0.3rem;
      font-size: 0.88rem; line-height: 1.4; transition: background 0.1s;
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .line-item .lnum {
      font-size: 0.72rem; color: var(--muted); min-width: 1.5rem; margin-top: 0.1rem; flex-shrink: 0;
    }
    .line-item .ltext { flex: 1; }
    .line-item .ltime { font-size: 0.72rem; color: var(--success); font-family: monospace; flex-shrink: 0; margin-top: 0.1rem; }

    .line-item.done    { background: #f0fdf4; color: #166534; }
    .line-item.current {
      background: var(--accent); color: #fff;
      font-weight: 600;
    }
    .line-item.current .lnum  { color: rgba(255,255,255,0.7); }
    .line-item.current .ltime { color: rgba(255,255,255,0.8); }
    .line-item.upcoming { color: var(--muted); }

    /* 탭 컨트롤 바 */
    .tap-controls {
      border-top: 1px solid var(--border); padding: 0.75rem 1rem;
      background: var(--surface); flex-shrink: 0;
    }
    .kbd-hints { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .kbd-hint  { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 0.25rem; }
    kbd {
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: 0.15rem 0.4rem; font-size: 0.72rem; font-family: monospace;
    }
    .tap-flash {
      text-align: center; font-size: 0.82rem; color: var(--accent);
      font-weight: 600; height: 1.2em; margin-bottom: 0.4rem;
      transition: opacity 0.3s;
    }

    /* ════════════════════════════════════════════════════
       PHASE 3 — 검수 & 편집
    ════════════════════════════════════════════════════ */
    #phase-review { padding: 1.5rem 1rem 3rem; }
    .review-wrap  { max-width: 900px; margin: 0 auto; }

    .review-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;
    }
    .review-header h2 { font-size: 1.1rem; font-weight: 700; }
    .review-actions { display: flex; gap: 0.5rem; }

    /* 비디오 + 자막 오버레이 */
    .review-video-wrap {
      position: relative; background: #000;
      border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem;
    }
    .review-video-wrap video { width: 100%; display: block; max-height: 50vh; object-fit: contain; }
    .sub-overlay {
      position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); color: #fff; padding: 0.4rem 1.2rem;
      border-radius: 6px; font-size: 1.05rem; font-weight: 500;
      max-width: 85%; text-align: center; pointer-events: none;
      min-height: 1.8em; display: flex; align-items: center; justify-content: center;
    }

    /* 편집 테이블 */
    .cue-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    thead th {
      background: var(--surface); border-bottom: 2px solid var(--border);
      padding: 0.55rem 0.75rem; text-align: left;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
    }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    tbody tr:hover   { background: var(--surface); }
    tbody tr.playing { background: #ede9fe; }
    td { padding: 0.5rem 0.75rem; vertical-align: middle; }
    td.cue-num { color: var(--muted); font-size: 0.78rem; width: 2rem; }
    td.cue-text { line-height: 1.4; }

    .time-input {
      width: 90px; border: 1px solid var(--border); border-radius: 5px;
      padding: 0.2rem 0.4rem; font-size: 0.8rem; font-family: monospace;
      color: var(--text); background: #fff; outline: none;
    }
    .time-input:focus { border-color: var(--accent); }

    footer { text-align: center; margin-top: 2.5rem; font-size: 0.78rem; color: #c0c5d8; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════
     PHASE 1 — 설정
════════════════════════════════════════════════════ -->
<div id="phase-setup" class="phase active">
  <div class="setup-wrap">
    <header>
      <h1>VTT <span>Maker</span></h1>
      <p>영상을 직접 보면서 스페이스바로 자막 타이밍을 지정하세요 · API 불필요</p>
    </header>

    <div class="card">
      <span class="card-label">영상 파일</span>
      <div class="file-drop" id="fileDrop">
        <input type="file" id="videoFile" accept="video/*" />
        <div class="drop-icon">🎬</div>
        <div class="drop-text">파일을 드래그하거나 클릭하여 선택</div>
        <div class="drop-name" id="fileName"></div>
      </div>
    </div>

    <div class="card">
      <span class="card-label">스크립트</span>
      <textarea id="scriptInput" placeholder="📝 자막으로 사용할 스크립트를 붙여 넣으세요."></textarea>
      <p class="hint">줄바꿈 한 칸 = 자막 하나. 텍스트는 수정 없이 그대로 유지됩니다.</p>
    </div>

    <div id="setup-error"></div>
    <button class="btn btn-block" onclick="startTapping()">▶ 타이밍 작업 시작</button>

    <footer style="margin-top:2rem">파일은 브라우저에서만 처리됩니다. 서버 전송 없음.</footer>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     PHASE 2 — 타이밍 작업
════════════════════════════════════════════════════ -->
<div id="phase-tap" class="phase">

  <div class="tap-top">
    <h2>🎬 타이밍 작업</h2>
    <span class="tap-meta" id="tapMeta"></span>
    <div style="display:flex;gap:0.5rem">
      <button class="btn btn-ghost" style="padding:0.4rem 0.85rem;font-size:0.82rem" onclick="resetTapping()">↩ 처음부터</button>
      <button class="btn" style="padding:0.4rem 0.85rem;font-size:0.82rem" onclick="finishTapping()">완료 →</button>
    </div>
  </div>

  <div class="tap-body">
    <!-- 비디오 -->
    <div class="tap-video-wrap">
      <video id="tapVideo" controls></video>
      <div class="tap-sub-preview" id="tapSubPreview"></div>
    </div>

    <!-- 줄 목록 -->
    <div class="tap-panel">
      <div class="tap-panel-head" id="tapPanelHead">다음에 기록할 줄</div>
      <div class="lines-list" id="linesList"></div>

      <div class="tap-controls">
        <div class="tap-flash" id="tapFlash"></div>
        <div class="kbd-hints">
          <span class="kbd-hint"><kbd>Space</kbd> 현재 줄 기록</span>
          <span class="kbd-hint"><kbd>Backspace</kbd> 되돌리기</span>
          <span class="kbd-hint"><kbd>R</kbd> 전체 초기화</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     PHASE 3 — 검수 & 편집
════════════════════════════════════════════════════ -->
<div id="phase-review" class="phase">
  <div class="review-wrap">

    <div class="review-header">
      <h2>✅ 검수 & 편집</h2>
      <div class="review-actions">
        <button class="btn btn-ghost" onclick="goBackToTap()">← 타이밍 재작업</button>
        <button class="btn" onclick="downloadVTT()">⬇ VTT 다운로드</button>
      </div>
    </div>

    <!-- 비디오 -->
    <div class="review-video-wrap">
      <video id="reviewVideo" controls></video>
      <div class="sub-overlay" id="subOverlay"></div>
    </div>

    <!-- 편집 테이블 -->
    <div class="cue-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>시작</th>
            <th>종료</th>
            <th>자막 텍스트</th>
          </tr>
        </thead>
        <tbody id="cueTableBody"></tbody>
      </table>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button class="btn btn-block btn-ghost" onclick="goBackToTap()">← 타이밍 재작업</button>
      <button class="btn btn-block" onclick="downloadVTT()">⬇ VTT 다운로드</button>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  상태
// ══════════════════════════════════════════════════════
let videoURL  = null;
let videoName = 'subtitles';
let lines     = [];   // 스크립트 줄 배열
let taps      = [];   // 기록된 타임스탬프 (최대 lines.length + 1개)
let tapIndex  = 0;    // 다음에 기록될 탭 번호

// ── Phase 1 : 설정 ────────────────────────────────────
const fileInput  = document.getElementById('videoFile');
const fileDrop   = document.getElementById('fileDrop');
const fileNameEl = document.getElementById('fileName');

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (f) setVideoFile(f);
});
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault(); fileDrop.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) {
    const dt = new DataTransfer(); dt.items.add(f); fileInput.files = dt.files;
    setVideoFile(f);
  }
});

function setVideoFile(f) {
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL  = URL.createObjectURL(f);
  videoName = f.name.replace(/\.[^.]+$/, '');
  fileNameEl.textContent = f.name;
}

function startTapping() {
  const errEl = document.getElementById('setup-error');
  errEl.textContent = '';

  if (!videoURL)  { errEl.textContent = '영상 파일을 선택해주세요.'; return; }
  const raw = document.getElementById('scriptInput').value.trim();
  if (!raw)       { errEl.textContent = '스크립트를 입력해주세요.'; return; }

  lines    = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  taps     = [];
  tapIndex = 0;

  // 영상 연결
  const tapVid = document.getElementById('tapVideo');
  tapVid.src = videoURL;
  tapVid.currentTime = 0;

  showPhase('tap');
  renderLinesList();
  updateTapMeta();
}

// ── Phase 2 : 타이밍 작업 ─────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('phase-tap').classList.contains('active')) return;

  if (e.code === 'Space') {
    e.preventDefault();
    recordTap();
  } else if (e.code === 'Backspace') {
    e.preventDefault();
    undoTap();
  } else if (e.code === 'KeyR') {
    e.preventDefault();
    resetTapping();
  }
});

function recordTap() {
  if (tapIndex > lines.length) return; // 이미 완료

  const t = document.getElementById('tapVideo').currentTime;

  // 시간 역행 방지
  if (tapIndex > 0 && t <= taps[tapIndex - 1]) {
    flashMsg('⚠ 이전 타임스탬프보다 앞입니다. 영상을 앞으로 이동 후 다시 누르세요.');
    return;
  }

  taps[tapIndex] = t;
  tapIndex++;
  renderLinesList();
  updateTapMeta();

  // 직전 줄 자막 미리보기
  if (tapIndex > 1) showTapPreview(lines[tapIndex - 2]);

  flashMsg(tapIndex <= lines.length
    ? `✓ ${tapIndex}번 줄 시작 기록 (${fmtSec(t)})`
    : `✓ 마지막 줄 종료 기록 — 완료 버튼을 누르세요`);

  if (tapIndex > lines.length) {
    // 자동 완료
    setTimeout(finishTapping, 600);
  }
}

function undoTap() {
  if (tapIndex === 0) return;
  tapIndex--;
  taps.splice(tapIndex, 1);
  renderLinesList();
  updateTapMeta();
  hideTapPreview();
  flashMsg('↩ 되돌렸습니다');
}

function resetTapping() {
  if (tapIndex > 0 && !confirm('모든 타이밍을 초기화하고 처음부터 다시 하시겠습니까?')) return;
  taps     = [];
  tapIndex = 0;
  const v = document.getElementById('tapVideo');
  v.pause(); v.currentTime = 0;
  renderLinesList();
  updateTapMeta();
  hideTapPreview();
  flashMsg('');
}

function finishTapping() {
  if (tapIndex < 2) {
    alert('최소 2번 이상 기록해야 합니다. (줄 시작 + 종료)');
    return;
  }
  buildReview();
  showPhase('review');
}

function goBackToTap() {
  showPhase('tap');
  renderLinesList();
  updateTapMeta();
}

function renderLinesList() {
  const list = document.getElementById('linesList');
  list.innerHTML = '';

  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'line-item ' + (
      i < tapIndex - 1  ? 'done' :
      i === tapIndex - 1 && tapIndex > 0 ? 'done' :
      i === tapIndex    ? 'current' : 'upcoming'
    );

    // tapIndex 기준 해설:
    // tap[0] = 줄0 시작, tap[1] = 줄1 시작(=줄0 종료), ...
    // 줄 i가 "done" = taps[i]와 taps[i+1]이 모두 있을 때
    const isDone = taps[i] !== undefined && taps[i + 1] !== undefined;
    const hasStart = taps[i] !== undefined;

    el.className = 'line-item ' + (
      isDone   ? 'done'    :
      hasStart ? 'current' :
      i === tapIndex ? 'current' : 'upcoming'
    );

    const timeStr = taps[i] !== undefined
      ? (taps[i + 1] !== undefined
          ? `${fmtSec(taps[i])} → ${fmtSec(taps[i+1])}`
          : fmtSec(taps[i]))
      : '';

    el.innerHTML = `
      <span class="lnum">${i + 1}</span>
      <span class="ltext">${escHtml(line)}</span>
      ${timeStr ? `<span class="ltime">${timeStr}</span>` : ''}
    `;
    list.appendChild(el);
  });

  // 현재 줄로 스크롤
  const currentEl = list.querySelector('.current');
  if (currentEl) currentEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function updateTapMeta() {
  const done  = Math.min(tapIndex, lines.length);
  const total = lines.length;
  document.getElementById('tapMeta').textContent = `${done} / ${total} 줄 기록됨`;
  document.getElementById('tapPanelHead').textContent =
    tapIndex <= lines.length
      ? `${tapIndex + 1}번 줄 시작 지점에서 Space`
      : '완료! → 버튼을 누르세요';
}

function flashMsg(msg) {
  const el = document.getElementById('tapFlash');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._timer);
  if (msg) el._timer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function showTapPreview(text) {
  const el = document.getElementById('tapSubPreview');
  el.textContent = text;
  el.style.display = 'flex';
}
function hideTapPreview() {
  document.getElementById('tapSubPreview').style.display = 'none';
}

// ── Phase 3 : 검수 & 편집 ─────────────────────────────
function buildReview() {
  const reviewVid = document.getElementById('reviewVideo');
  reviewVid.src = videoURL;
  reviewVid.currentTime = 0;

  // 자막 배열 만들기
  // taps: [s0, s1, s2, ..., sN]  (N = lines.length)
  // cue i: start = taps[i], end = taps[i+1]
  // 마지막 줄 end: taps[lines.length] 있으면 그것, 없으면 taps[last] + 2
  const cues = lines.map((line, i) => ({
    line,
    start: taps[i] || 0,
    end:   taps[i + 1] !== undefined ? taps[i + 1] : (taps[i] || 0) + 2,
  }));

  renderCueTable(cues);

  // 자막 오버레이
  const overlay = document.getElementById('subOverlay');
  reviewVid.addEventListener('timeupdate', () => {
    const t = reviewVid.currentTime;
    const cur = cues.find(c => t >= c.start && t < c.end);
    overlay.textContent = cur ? cur.line : '';

    // 테이블 하이라이트
    document.querySelectorAll('#cueTableBody tr').forEach((row, i) => {
      row.classList.toggle('playing', t >= cues[i].start && t < cues[i].end);
    });
  });
}

function renderCueTable(cues) {
  const tbody = document.getElementById('cueTableBody');
  tbody.innerHTML = '';

  cues.forEach((cue, i) => {
    const tr = document.createElement('tr');

    // 행 클릭 → 해당 시간으로 이동
    tr.addEventListener('click', () => {
      const v = document.getElementById('reviewVideo');
      v.currentTime = cue.start;
      v.play();
    });

    tr.innerHTML = `
      <td class="cue-num">${i + 1}</td>
      <td><input class="time-input" data-idx="${i}" data-field="start" value="${fmtSec(cue.start)}" /></td>
      <td><input class="time-input" data-idx="${i}" data-field="end"   value="${fmtSec(cue.end)}"   /></td>
      <td class="cue-text">${escHtml(cue.line)}</td>
    `;
    tbody.appendChild(tr);
  });

  // 시간 입력 변경 처리
  tbody.querySelectorAll('.time-input').forEach(input => {
    input.addEventListener('click', e => e.stopPropagation()); // 행 클릭 방지
    input.addEventListener('change', e => {
      const idx   = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      const val   = parseSec(e.target.value);
      if (val === null) { e.target.value = fmtSec(cues[idx][field]); return; }
      cues[idx][field] = val;
      e.target.value = fmtSec(val);
    });
  });

  // VTT 생성용 참조 저장
  window._cues = cues;
}

function downloadVTT() {
  const cues = window._cues;
  if (!cues) return;

  let vtt = 'WEBVTT\n\n';
  cues.forEach(c => {
    vtt += `${fmtVTT(c.start)} --> ${fmtVTT(c.end)}\n${c.line}\n\n`;
  });

  const blob = new Blob([vtt], { type: 'text/vtt;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = videoName + '.vtt'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── 화면 전환 ─────────────────────────────────────────
function showPhase(name) {
  ['setup', 'tap', 'review'].forEach(p => {
    const el = document.getElementById(`phase-${p}`);
    el.classList.toggle('active', p === name);
  });
}

// ── 시간 유틸 ─────────────────────────────────────────
function fmtSec(s) {
  if (s == null || isNaN(s)) s = 0;
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1);
  return `${m}:${sec.padStart(4, '0')}`;
}

function parseSec(str) {
  // 받는 형식: "M:SS.s" 또는 "SS.s" 또는 숫자
  str = str.trim();
  if (str.includes(':')) {
    const parts = str.split(':');
    const m = parseFloat(parts[0]);
    const s = parseFloat(parts[1]);
    if (isNaN(m) || isNaN(s)) return null;
    return m * 60 + s;
  }
  const v = parseFloat(str);
  return isNaN(v) ? null : v;
}

function fmtVTT(s) {
  if (s == null || isNaN(s)) s = 0;
  const h   = Math.floor(s / 3600);
  const m   = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${pad2(h)}:${pad2(m)}:${sec.toFixed(3).padStart(6, '0')}`;
}

function pad2(n) { return String(Math.floor(n)).padStart(2, '0'); }
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
